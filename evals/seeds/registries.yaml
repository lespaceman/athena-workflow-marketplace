# Seed registries and explicit repos for the discovery phase.
# Loader emits one skill.discovered event per resolved skill.
#
# Categories track the survey themes (Spring Boot, Cloud SQL Postgres, React,
# Cloud Run, Secret Manager) so the reporter can filter by --filter-category.

registries:
  - name: voltagent
    url: https://github.com/VoltAgent/awesome-agent-skills
    type: index
  - name: antigravity
    url: https://github.com/sickn33/antigravity-awesome-skills
    type: index
  - name: anthropics
    url: https://github.com/anthropics/skills
    type: index
  - name: fastmcp
    url: https://fastmcp.me
    type: index

skills:
  # --- Java Spring Boot ---
  - skill_id: piomin/claude-ai-spring-boot#.claude/skills/spring-boot
    repo_url: https://github.com/piomin/claude-ai-spring-boot
    skill_path: .claude/skills/spring-boot
    category: java-spring-boot
    publisher_type: individual
  - skill_id: jdubois/dr-jskill#skills/spring-boot
    repo_url: https://github.com/jdubois/dr-jskill
    skill_path: skills/spring-boot
    category: java-spring-boot
    publisher_type: individual
  - skill_id: Jeffallan/claude-skills#skills/java-architect
    repo_url: https://github.com/Jeffallan/claude-skills
    skill_path: skills/java-architect
    category: java-spring-boot
    publisher_type: individual

  # --- GCP Cloud SQL Postgres ---
  - skill_id: gemini-cli-extensions/cloud-sql-postgresql#skills
    repo_url: https://github.com/gemini-cli-extensions/cloud-sql-postgresql
