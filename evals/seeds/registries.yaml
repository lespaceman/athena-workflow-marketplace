    category: gcp-cloud-sql-postgres
    publisher_type: official
  - skill_id: SpillwaveSolutions/mastering-postgresql-agent-skill#skills/mastering-postgresql
    repo_url: https://github.com/SpillwaveSolutions/mastering-postgresql-agent-skill
    skill_path: skills/mastering-postgresql
    category: gcp-cloud-sql-postgres
    publisher_type: community
  - skill_id: timescale/pg-aiguide#skills
    repo_url: https://github.com/timescale/pg-aiguide
    skill_path: skills
    category: gcp-cloud-sql-postgres
    publisher_type: official

  # --- React ---
  - skill_id: callstackincubator/agent-skills#skills/react-native-best-practices
    repo_url: https://github.com/callstackincubator/agent-skills
