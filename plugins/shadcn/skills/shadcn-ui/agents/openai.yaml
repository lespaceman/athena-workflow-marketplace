frontmatter:
  user-invocable: true
  argument-hint: "<intent> — e.g. 'add a login form', 'switch preset solar', 'add @acme/hero'"
interface:
  display_name: "shadcn/ui Components"
  short_description: "Install, compose, and theme shadcn/ui components from any registry"
  default_prompt: "Read the project's components.json, then install or compose the requested shadcn/ui components using semantic tokens, the configured base, and the project's aliases."

dependencies:
  tools:
    - type: "mcp"
      value: "shadcn"
      description: "shadcn MCP server for browsing registries, viewing items, and resolving install commands"
