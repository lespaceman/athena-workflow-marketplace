name: Release Changed Plugins And Workflows

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'workflows/**'
      - '.claude-plugin/marketplace.json'
      - '.athena-workflow/marketplace.json'
      - 'scripts/bump-versions.sh'
      - 'scripts/build-plugin-artifacts.mjs'

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump changed plugin and workflow versions
        run: bash scripts/bump-versions.sh

      - name: Collect changed plugins
        id: collect_plugins
        shell: bash
        run: |
          changed_plugins="$(
            git diff --name-only -- \
              plugins/*/package.json \
              plugins/*/.claude-plugin/plugin.json \
              plugins/*/.codex-plugin/plugin.json \
            | awk -F/ '/^plugins\/[^/]+\// {print $2}' \
            | sort -u
          )"

          if [ -z "$changed_plugins" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          {
            echo 'plugin_list<<EOF'
            printf '%s\n' "$changed_plugins"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Validate changed plugin packages
        if: steps.collect_plugins.outputs.changed == 'true'
        shell: bash
        run: |
          while IFS= read -r plugin; do
            [ -n "$plugin" ] || continue
            echo "Packing $plugin..."
            (cd "plugins/$plugin" && npm pack --dry-run)
          done <<'EOF'
          ${{ steps.collect_plugins.outputs.plugin_list }}
          EOF

      - name: Commit version bumps
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
          else
            git commit -m "chore: auto-bump versions [skip ci]"
            git pull --rebase origin main
            git push
          fi

      - name: Publish changed plugins to npm
        if: steps.collect_plugins.outputs.changed == 'true'
        shell: bash
        run: |
          while IFS= read -r plugin; do
            [ -n "$plugin" ] || continue
            echo "Publishing $plugin..."
            (cd "plugins/$plugin" && npm publish --access public --provenance)
          done <<'EOF'
          ${{ steps.collect_plugins.outputs.plugin_list }}
          EOF
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify published tarballs are fetchable
        if: steps.collect_plugins.outputs.changed == 'true'
        shell: bash
        run: |
          # Guards against npm's metadata-vs-tarball inconsistency: occasionally
          # `npm publish` succeeds and registers metadata but the tarball never
          # lands on the CDN, leaving the package uninstallable. Catch it here
          # rather than at user `npm install` time.
          fail=0
          while IFS= read -r plugin; do
            [ -n "$plugin" ] || continue
            pkg_name="$(node -p "require('./plugins/$plugin/package.json').name")"
            pkg_version="$(node -p "require('./plugins/$plugin/package.json').version")"
            tarball_url="$(npm view "${pkg_name}@${pkg_version}" dist.tarball 2>/dev/null)"
            if [ -z "$tarball_url" ]; then
              echo "::error::No tarball URL returned by registry for ${pkg_name}@${pkg_version}"
              fail=1
              continue
            fi
            echo "Verifying ${pkg_name}@${pkg_version} -> ${tarball_url}"
            ok=0
            for attempt in 1 2 3 4 5; do
              status="$(curl -sS -o /dev/null -w '%{http_code}' -I "$tarball_url" || echo "000")"
              if [ "$status" = "200" ]; then
                echo "  attempt ${attempt}: HTTP ${status} OK"
                ok=1
                break
              fi
              echo "  attempt ${attempt}: HTTP ${status} — retrying in $((attempt * 5))s"
              sleep $((attempt * 5))
            done
            if [ "$ok" != "1" ]; then
              echo "::error::Tarball for ${pkg_name}@${pkg_version} is not retrievable after publish (last status ${status}). npm registered metadata but did not persist the tarball — re-run the workflow or push a trivial change to force a republish."
              fail=1
            fi
          done <<'EOF'
          ${{ steps.collect_plugins.outputs.plugin_list }}
          EOF
          exit "$fail"
